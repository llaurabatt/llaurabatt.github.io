---
layout: none
---
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>About — {{ site.title | default: "Laura Battaglia" }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="icon" href="{{ '/favicon.svg' | relative_url }}" type="image/svg+xml"/>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}"/>
</head>
<body>
  <canvas id="tree-bg" aria-hidden="true"></canvas>
  <script src="{{ '/assets/js/tree.js' | relative_url }}"></script>
  <main class="hero">
    <section class="about-card" role="region" aria-label="About">
      <h1>About me</h1>
      <div class="about-body">
        {% capture about_md %}{% include about_text.md %}{% endcapture %}
        {{ about_md | markdownify }}
      </div>
      <div style="text-align:center;">
        <a href="{{ '/' | relative_url }}" class="back-btn">← Back</a>
      </div>
    </section>
  </main>
</body>
</html>
