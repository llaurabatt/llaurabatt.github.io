---
layout: none
---
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ site.title | default: "Home" }}</title>
    <meta name="description" content="{{ site.description | default: '' }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  </head>
  <body>
    <div class="background-tree-blur"></div>
    <main class="hero">
      <section class="card" role="region" aria-label="Landing profile">
  <img class="avatar" src="{{ '/me7.jpeg' | relative_url }}" alt="Portrait of {{ site.title | default: 'Laura Battaglia' }}" />
        <h1 class="name">{{ site.title | default: 'Laura Battaglia' }}</h1>
        <p class="tagline">{{ site.description | default: '' }}</p>
        <nav class="buttons" aria-label="Primary">
          <a class="btn about" href="{{ '/about.html' | relative_url }}">
            <span class="icon">
              <svg width="32" height="32" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="11" cy="11" r="11" fill="#6B7280"/><text x="11" y="16" text-anchor="middle" font-size="13" fill="#fff" font-family="Inter,Arial,sans-serif">i</text></svg>
            </span>
          </a>
          <a class="btn cv" href="{{ '/CV_Oct2025.pdf' | relative_url }}" target="_blank" rel="noopener noreferrer">
            <span class="icon">
              <svg width="32" height="32" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="11" cy="11" r="11" fill="#059669"/><text x="11" y="16" text-anchor="middle" font-size="11" fill="#fff" font-family="Inter,Arial,sans-serif">CV</text></svg>
            </span>
          </a>
          <a class="btn scholar" href="https://scholar.google.com/citations?user=IR5S8U4AAAAJ&hl=en&oi=ao" target="_blank" rel="noopener noreferrer">
            <img class="icon" src="{{ '/GoogleScholarSquare.svg' | relative_url }}" alt="Google Scholar" width="32" height="32" />
          </a>
          <a class="btn linkedin" href="https://www.linkedin.com/in/laura-battaglia-05bb5980/" target="_blank" rel="noopener noreferrer">
            <img class="icon" src="{{ '/linkedin.png' | relative_url }}" alt="LinkedIn" width="32" height="32" />
          </a>
          <a class="btn github" href="https://github.com/llaurabatt" target="_blank" rel="noopener noreferrer">
            <img class="icon" src="{{ '/github-mark.svg' | relative_url }}" alt="GitHub" width="32" height="32" />
          </a>
        </nav>
        </nav>
      </section>
    </main>
  </body>
</html>
